<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <style>
    body { font-family: Arial; background:#0f0f0f; color:#fff; }
    .work-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; }
    .work-card { background:#1a1a1a; padding:20px; border-radius:12px; }
    .card-title { font-weight:bold; margin-bottom:10px; }
  </style>
</head>
<body>

  <section id="work">
    <h2>My Projects</h2>
    <div class="work-grid" id="workGrid"></div>
  </section>

  <script>
  const container = document.getElementById('workGrid');

  if (container) {
    fetch('/content/projects.json')
      .then(res => res.json())
      .then(data => {
        data.forEach(project => {
          const el = document.createElement('div');
          el.innerHTML = `
            <div class="work-card">
              <div class="card-title">${project.title}</div>
              <div class="card-desc">${project.description}</div>
            </div>
          `;
          container.appendChild(el);
        });
      });
  }
  </script>

</body>
</html>
